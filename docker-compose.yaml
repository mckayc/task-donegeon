version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: taskdonegeon
      POSTGRES_PASSWORD: donegeon2025
      POSTGRES_DB: taskdonegeon_db
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskdonegeon -d taskdonegeon_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgres://taskdonegeon:donegeon2025@db:5432/taskdonegeon_db
      - JWT_SECRET=your_jwt_secret_here
      - NODE_ENV=development
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  db_data: